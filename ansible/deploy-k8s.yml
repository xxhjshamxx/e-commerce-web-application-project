---
- name: Deploy Kubernetes Microservices Stack
  hosts: all
  become: yes
  gather_facts: yes

  tasks:
    - name: Check if kubectl is available
      ansible.builtin.command: kubectl version --client
      register: kubectl_check
      ignore_errors: yes
      changed_when: false

    - name: Fail if kubectl is not installed
      ansible.builtin.fail:
        msg: "kubectl is not installed on target host"
      when: kubectl_check.rc != 0

    - name: Deploy Kubernetes manifests
      ansible.builtin.shell:
        cmd: kubectl apply -f ../kubernetes-files/
      register: deploy_output
      changed_when: "'configured' in deploy_output.stdout or 'created' in deploy_output.stdout
