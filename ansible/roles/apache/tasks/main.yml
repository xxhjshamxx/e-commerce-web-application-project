---
- name: Install Apache
  ansible.builtin.apt:
    name: apache2
    state: present

- name: Copy Apache site configuration
  ansible.builtin.template:
    src: apache.conf.j2
    dest: /etc/apache2/sites-available/000-default.conf
  notify: Restart apache

- name: Start and enable Apache service
  ansible.builtin.service:
    name: apache2
    state: started
    enabled: true

# فتح بورت 80 في الفايروول
- name: Allow HTTP port 80 through firewall
  community.general.ufw:
    rule: allow
    port: "80"
    proto: tcp

# اختبار إن الموقع شغال فعلا عن طريق HTTP
- name: Test that the site is responding
  ansible.builtin.uri:
    url: "http://localhost"
    status_code: 200
  register: apache_check

- name: Show test result
  ansible.builtin.debug:
    msg: "Apache site is up, status code: {{ apache_check.status }}"
