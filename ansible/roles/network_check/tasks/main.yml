---
# =====================================================================
# ROLE: network_check
# Two different kinds of "ping":
#   1) ansible.builtin.ping -> tests that Ansible can reach/execute on
#      the managed host at all (module-level, not ICMP)
#   2) a real ICMP ping from the managed host out to external targets,
#      to prove outbound network connectivity
# =====================================================================

- name: Ansible connectivity ping (control -> managed host)
  ansible.builtin.ping:
  register: network_check_ping_result
  tags: [ping]

- name: Show Ansible ping result
  ansible.builtin.debug:
    msg: "Ansible reached {{ inventory_hostname }} successfully: {{ network_check_ping_result.ping }}"
  tags: [ping]

- name: Real ICMP ping from the managed host to external targets
  ansible.builtin.command: "ping -c 3 -W 2 {{ item }}"
  loop: "{{ network_check_targets }}"
  register: network_check_icmp_results
  changed_when: false
  failed_when: false
  tags: [ping]

- name: Report ICMP reachability per target
  ansible.builtin.debug:
    msg: >-
      {{ item.item }} ->
      {{ 'REACHABLE' if item.rc == 0 else 'UNREACHABLE (rc=' ~ item.rc ~ ')' }}
  loop: "{{ network_check_icmp_results.results }}"
  loop_control:
    label: "{{ item.item }}"
  tags: [ping]

- name: Fail the play if every single target was unreachable
  ansible.builtin.fail:
    msg: "No network targets were reachable from {{ inventory_hostname }}. Check outbound connectivity."
  when: network_check_icmp_results.results | selectattr('rc', 'equalto', 0) | list | length == 0
  tags: [ping]
