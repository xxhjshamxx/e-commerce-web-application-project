---
- name: Install Nginx
  ansible.builtin.apt:
    name: nginx
    state: present

- name: Copy Nginx site configuration
  ansible.builtin.template:
    src: nginx.conf.j2
    dest: /etc/nginx/sites-available/default
  notify: Restart nginx

- name: Start and enable Nginx service
  ansible.builtin.service:
    name: nginx
    state: started
    enabled: true

# فتح بورت 80 في الفايروول
- name: Allow HTTP port 80 through firewall
  community.general.ufw:
    rule: allow
    port: "80"
    proto: tcp

# اختبار إن الموقع شغال فعلا عن طريق HTTP
- name: Test that the site is responding
  ansible.builtin.uri:
    url: "http://localhost"
    status_code: 200
  register: nginx_check

- name: Show test result
  ansible.builtin.debug:
    msg: "Nginx site is up, status code: {{ nginx_check.status }}"
