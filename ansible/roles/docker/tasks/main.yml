---
# =====================================================================
# ROLE: docker
# Installs Docker Engine (CE) following Docker's official repo method,
# for both Debian-family (Ubuntu/Debian) and RedHat-family
# (RHEL/CentOS/Rocky/Alma) hosts. Idempotent: safe to re-run.
# =====================================================================

- name: Install Docker on Debian-family hosts
  ansible.builtin.include_tasks: install-Debian.yml
  when: ansible_facts['os_family'] == "Debian"
  tags: [docker]

- name: Install Docker on RedHat-family hosts
  ansible.builtin.include_tasks: install-RedHat.yml
  when: ansible_facts['os_family'] == "RedHat"
  tags: [docker]

- name: Fail fast on unsupported OS families
  ansible.builtin.fail:
    msg: >
      Unsupported OS family '{{ ansible_facts['os_family'] }}'. This role only
      supports Debian-family and RedHat-family distributions.
  when: ansible_facts['os_family'] not in ["Debian", "RedHat"]
  tags: [docker]

- name: Ensure docker service is started and enabled
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: true
  tags: [docker]

- name: Add users to the docker group (run docker without sudo)
  ansible.builtin.user:
    name: "{{ item }}"
    groups: docker
    append: true
  loop: "{{ docker_users }}"
  when: docker_users is defined and docker_users | length > 0
  tags: [docker]

- name: Verify Docker installation
  ansible.builtin.command: docker --version
  register: docker_version_output
  changed_when: false
  tags: [docker]

- name: Show installed Docker version
  ansible.builtin.debug:
    msg: "{{ docker_version_output.stdout }}"
  tags: [docker]

- name: Verify Docker Compose plugin installation
  ansible.builtin.command: docker compose version
  register: docker_compose_version_output
  changed_when: false
  failed_when: false
  tags: [docker]

- name: Show installed Docker Compose version
  ansible.builtin.debug:
    msg: "{{ docker_compose_version_output.stdout | default('docker compose plugin not detected') }}"
  tags: [docker]
