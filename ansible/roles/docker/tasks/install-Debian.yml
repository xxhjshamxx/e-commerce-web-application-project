---
# Docker CE install for Ubuntu/Debian, following:
# https://docs.docker.com/engine/install/ubuntu/

- name: Remove old/conflicting Docker packages
  ansible.builtin.apt:
    name: "{{ docker_old_packages_debian }}"
    state: absent
  failed_when: false

- name: Install prerequisite packages
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present
    update_cache: true

- name: Create keyrings directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Download Docker's official GPG key
  ansible.builtin.get_url:
    url: "https://download.docker.com/linux/{{ ansible_facts['distribution'] | lower }}/gpg"
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"
    force: false

- name: Detect dpkg architecture
  ansible.builtin.command: dpkg --print-architecture
  register: docker_dpkg_arch
  changed_when: false

- name: Add Docker APT repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch={{ docker_dpkg_arch.stdout }} signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/{{ ansible_facts['distribution'] | lower }}
      {{ ansible_facts['distribution_release'] }} stable
    filename: docker
    state: present
    update_cache: true
  notify: restart docker

- name: Install Docker Engine and plugins
  ansible.builtin.apt:
    name: "{{ docker_packages }}"
    state: present
    update_cache: true
