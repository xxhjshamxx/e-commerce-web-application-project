---
# Docker CE install for RHEL8+/CentOS8+/Rocky/Alma, following:
# https://docs.docker.com/engine/install/centos/
# NOTE: assumes a dnf-based system (RHEL/CentOS/Rocky/Alma 8 or newer).

- name: Remove old/conflicting Docker packages
  ansible.builtin.dnf:
    name: "{{ docker_old_packages_redhat }}"
    state: absent
  failed_when: false

- name: Install dnf-utils
  ansible.builtin.dnf:
    name: dnf-utils
    state: present

- name: Download Docker CE repo file
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/centos/docker-ce.repo
    dest: /etc/yum.repos.d/docker-ce.repo
    mode: "0644"
  notify: restart docker

- name: Install Docker Engine and plugins
  ansible.builtin.dnf:
    name: "{{ docker_packages }}"
    state: present
