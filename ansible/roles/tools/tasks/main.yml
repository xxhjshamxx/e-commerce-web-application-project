---
# =====================================================================
# ROLE: tools
# Generic "install any tool" role:
#   1) Installs any package available in the distro repos (tools_extra_packages)
#   2) Optionally installs specific DevOps binaries straight from their
#      official release URLs (kubectl, terraform, awscli, helm)
# =====================================================================

- name: Install extra tool packages from distro repos
  ansible.builtin.package:
    name: "{{ tools_extra_packages }}"
    state: present
  when: tools_extra_packages is defined and tools_extra_packages | length > 0
  tags: [tools]

- name: Normalize CPU architecture name for binary downloads
  ansible.builtin.set_fact:
    tools_arch: "{{ 'arm64' if ansible_facts['architecture'] in ['aarch64', 'arm64'] else 'amd64' }}"
  tags: [tools]

# ---------------------------------------------------------------------
# kubectl
# ---------------------------------------------------------------------
- name: Install kubectl
  when: tools_install_kubectl | bool
  tags: [tools, kubectl]
  block:
    - name: Download kubectl binary
      ansible.builtin.get_url:
        url: "https://dl.k8s.io/release/{{ tools_kubectl_version }}/bin/linux/{{ tools_arch }}/kubectl"
        dest: /usr/local/bin/kubectl
        mode: "0755"

    - name: Verify kubectl installation
      ansible.builtin.command: kubectl version --client --output=yaml
      register: tools_kubectl_check
      changed_when: false

    - name: Show kubectl version
      ansible.builtin.debug:
        msg: "{{ tools_kubectl_check.stdout }}"

# ---------------------------------------------------------------------
# Terraform
# ---------------------------------------------------------------------
- name: Install Terraform
  when: tools_install_terraform | bool
  tags: [tools, terraform]
  block:
    - name: Download Terraform archive
      ansible.builtin.get_url:
        url: "https://releases.hashicorp.com/terraform/{{ tools_terraform_version }}/terraform_{{ tools_terraform_version }}_linux_{{ tools_arch }}.zip"
        dest: "/tmp/terraform_{{ tools_terraform_version }}.zip"
        mode: "0644"

    - name: Unarchive Terraform binary to /usr/local/bin
      ansible.builtin.unarchive:
        src: "/tmp/terraform_{{ tools_terraform_version }}.zip"
        dest: /usr/local/bin
        remote_src: true
        mode: "0755"

    - name: Verify Terraform installation
      ansible.builtin.command: terraform version
      register: tools_terraform_check
      changed_when: false

    - name: Show Terraform version
      ansible.builtin.debug:
        msg: "{{ tools_terraform_check.stdout_lines }}"

# ---------------------------------------------------------------------
# AWS CLI v2
# ---------------------------------------------------------------------
- name: Install AWS CLI v2
  when: tools_install_awscli | bool
  tags: [tools, awscli]
  block:
    - name: Map architecture to AWS CLI naming
      ansible.builtin.set_fact:
        tools_awscli_arch: "{{ 'aarch64' if tools_arch == 'arm64' else 'x86_64' }}"

    - name: Download AWS CLI v2 installer
      ansible.builtin.get_url:
        url: "https://awscli.amazonaws.com/awscli-exe-linux-{{ tools_awscli_arch }}.zip"
        dest: /tmp/awscliv2.zip
        mode: "0644"

    - name: Unarchive AWS CLI installer
      ansible.builtin.unarchive:
        src: /tmp/awscliv2.zip
        dest: /tmp
        remote_src: true

    - name: Run AWS CLI installer
      ansible.builtin.command: /tmp/aws/install --update
      args:
        creates: /usr/local/bin/aws

    - name: Verify AWS CLI installation
      ansible.builtin.command: aws --version
      register: tools_awscli_check
      changed_when: false

    - name: Show AWS CLI version
      ansible.builtin.debug:
        msg: "{{ tools_awscli_check.stdout }}"

# ---------------------------------------------------------------------
# Helm
# ---------------------------------------------------------------------
- name: Install Helm
  when: tools_install_helm | bool
  tags: [tools, helm]
  block:
    - name: Download Helm archive
      ansible.builtin.get_url:
        url: "https://get.helm.sh/helm-{{ tools_helm_version }}-linux-{{ tools_arch }}.tar.gz"
        dest: "/tmp/helm-{{ tools_helm_version }}.tar.gz"
        mode: "0644"

    - name: Extract Helm archive
      ansible.builtin.unarchive:
        src: "/tmp/helm-{{ tools_helm_version }}.tar.gz"
        dest: /tmp
        remote_src: true

    - name: Install Helm binary to /usr/local/bin
      ansible.builtin.copy:
        src: "/tmp/linux-{{ tools_arch }}/helm"
        dest: /usr/local/bin/helm
        mode: "0755"
        remote_src: true

    - name: Verify Helm installation
      ansible.builtin.command: helm version
      register: tools_helm_check
      changed_when: false

    - name: Show Helm version
      ansible.builtin.debug:
        msg: "{{ tools_helm_check.stdout }}"
