networks:
  boutique-net:
    driver: bridge

volumes:
  redis-data:

services:
  # ----------------------------------------------------------------
  # In-memory store used by cartservice (was an emptyDir volume in K8s)
  # ----------------------------------------------------------------
  redis-cart:
    image: redis:alpine
    container_name: redis-cart
    restart: unless-stopped
    networks:
      - boutique-net
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ----------------------------------------------------------------
  # Ad service (Java) - src/adservice
  # ----------------------------------------------------------------
  adservice:
    build:
      context: ./src/adservice
    container_name: adservice
    restart: unless-stopped
    networks:
      - boutique-net
    environment:
      PORT: "9555"

  # ----------------------------------------------------------------
  # Product catalog service (Go) - src/productcatalogservice
  # ----------------------------------------------------------------
  productcatalogservice:
    build:
      context: ./src/productcatalogservice
    container_name: productcatalogservice
    restart: unless-stopped
    networks:
      - boutique-net
    environment:
      PORT: "3550"
      DISABLE_PROFILER: "1"

  # ----------------------------------------------------------------
  # Currency service (Node.js) - src/currencyservice
  # ----------------------------------------------------------------
  currencyservice:
    build:
      context: ./src/currencyservice
    container_name: currencyservice
    restart: unless-stopped
    networks:
      - boutique-net
    environment:
      PORT: "7000"
      DISABLE_PROFILER: "1"

  # ----------------------------------------------------------------
  # Payment service (Node.js) - src/paymentservice
  # ----------------------------------------------------------------
  paymentservice:
    build:
      context: ./src/paymentservice
    container_name: paymentservice
    restart: unless-stopped
    networks:
      - boutique-net
    environment:
      PORT: "50051"
      DISABLE_PROFILER: "1"

  # ----------------------------------------------------------------
  # Shipping service (Go) - src/shippingservice
  # ----------------------------------------------------------------
  shippingservice:
    build:
      context: ./src/shippingservice
    container_name: shippingservice
    restart: unless-stopped
    networks:
      - boutique-net
    environment:
      PORT: "50051"
      DISABLE_PROFILER: "1"

  # ----------------------------------------------------------------
  # Email service (Python) - src/emailservice
  # ----------------------------------------------------------------
  emailservice:
    build:
      context: ./src/emailservice
    container_name: emailservice
    restart: unless-stopped
    networks:
      - boutique-net
    environment:
      PORT: "8080"
      DISABLE_PROFILER: "1"

  # ----------------------------------------------------------------
  # Cart service (.NET) - Dockerfile lives in src/cartservice/src
  # ----------------------------------------------------------------
  cartservice:
    build:
      context: ./src/cartservice/src
    container_name: cartservice
    restart: unless-stopped
    networks:
      - boutique-net
    environment:
      REDIS_ADDR: "redis-cart:6379"
    depends_on:
      redis-cart:
        condition: service_healthy

  # ----------------------------------------------------------------
  # Recommendation service (Python) - src/recommendationservice
  # ----------------------------------------------------------------
  recommendationservice:
    build:
      context: ./src/recommendationservice
    container_name: recommendationservice
    restart: unless-stopped
    networks:
      - boutique-net
    environment:
      PORT: "8080"
      PRODUCT_CATALOG_SERVICE_ADDR: "productcatalogservice:3550"
      DISABLE_PROFILER: "1"
    depends_on:
      - productcatalogservice

  # ----------------------------------------------------------------
  # Checkout service (Go) - src/checkoutservice
  # Orchestrates product catalog, shipping, payment, email, currency, cart
  # ----------------------------------------------------------------
  checkoutservice:
    build:
      context: ./src/checkoutservice
    container_name: checkoutservice
    restart: unless-stopped
    networks:
      - boutique-net
    environment:
      PORT: "5050"
      PRODUCT_CATALOG_SERVICE_ADDR: "productcatalogservice:3550"
      SHIPPING_SERVICE_ADDR: "shippingservice:50051"
      PAYMENT_SERVICE_ADDR: "paymentservice:50051"
      EMAIL_SERVICE_ADDR: "emailservice:8080"
      CURRENCY_SERVICE_ADDR: "currencyservice:7000"
      CART_SERVICE_ADDR: "cartservice:7070"
    depends_on:
      - productcatalogservice
      - shippingservice
      - paymentservice
      - emailservice
      - currencyservice
      - cartservice

  # ----------------------------------------------------------------
  # Frontend (Go) - src/frontend - the public entry point of the app
  # ----------------------------------------------------------------
  frontend:
    build:
      context: ./src/frontend
    container_name: frontend
    restart: unless-stopped
    networks:
      - boutique-net
    ports:
      - "8081:8080"
    environment:
      PORT: "8080"
      PRODUCT_CATALOG_SERVICE_ADDR: "productcatalogservice:3550"
      CURRENCY_SERVICE_ADDR: "currencyservice:7000"
      CART_SERVICE_ADDR: "cartservice:7070"
      RECOMMENDATION_SERVICE_ADDR: "recommendationservice:8080"
      SHIPPING_SERVICE_ADDR: "shippingservice:50051"
      CHECKOUT_SERVICE_ADDR: "checkoutservice:5050"
      AD_SERVICE_ADDR: "adservice:9555"
      ENV_PLATFORM: "local"
      ENABLE_PROFILER: "0"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8080/_healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      - productcatalogservice
      - currencyservice
      - cartservice
      - recommendationservice
      - shippingservice
      - checkoutservice
      - adservice

  # ----------------------------------------------------------------
  # Load generator (Python/Locust) - src/loadgenerator
  # ----------------------------------------------------------------
  loadgenerator:
    build:
      context: ./src/loadgenerator
    container_name: loadgenerator
    restart: unless-stopped
    networks:
      - boutique-net
    environment:
      FRONTEND_ADDR: "frontend:8080"
      USERS: "10"
    depends_on:
      frontend:
        condition: service_healthy
